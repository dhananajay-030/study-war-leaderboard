<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #666;
    --green: #4ade80;
    --red: #f87171;
    --amber: #fbbf24;
    --gold: #f59e0b;
    --silver: #94a3b8;
    --bronze: #b45309;
    --radius: 4px;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 24px 16px 60px; }

  /* Header */
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-size: clamp(20px,4vw,28px); font-weight: 800; letter-spacing: -0.5px; }
  .header .subtitle { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 4px; }
  .live-dot { display: inline-block; width: 7px; height: 7px; background: var(--green); border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
  .tab-btn { background: none; border: none; color: var(--muted); font-family: var(--sans); font-size: 13px; font-weight: 600; padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .2s, border-color .2s; letter-spacing: .3px; }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }
  .tab-btn:hover { color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Rank legend */
  .rank-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .legend-pill { font-family: var(--mono); font-size: 10px; padding: 3px 9px; border: 1px solid var(--border); border-radius: 20px; color: var(--muted); background: var(--surface); white-space: nowrap; }

  /* Board header */
  .board-header { display: grid; grid-template-columns: 28px 1fr 1fr 90px 80px; gap: 8px; padding: 6px 14px; font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

  /* LB row */
  .lb-row { display: grid; grid-template-columns: 28px 1fr 1fr 90px 80px; gap: 8px; align-items: center; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; background: var(--surface); transition: border-color .2s; }
  .lb-row:hover { border-color: #444; }
  .lb-pos { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .lb-pos.first { color: var(--gold); font-weight: 600; }
  .lb-pos.second { color: var(--silver); }
  .lb-pos.third { color: #cd7c39; }

  /* Username with pencil */
  .uname-wrap, .war-uname-wrap { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .uname-text { font-size: 13px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .war-uname-text { font-size: 12px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .uname-edit-btn { opacity: 0; background: none; border: none; cursor: pointer; color: var(--muted); font-size: 12px; flex-shrink: 0; padding: 2px 4px; border-radius: 3px; transition: opacity .15s, color .15s; line-height: 1; }
  .uname-wrap:hover .uname-edit-btn,
  .war-uname-wrap:hover .uname-edit-btn { opacity: 1; }
  .uname-edit-btn:hover { color: var(--text); }
  .uname-input { background: var(--bg); border: 1px solid #555; border-radius: 3px; color: var(--text); font-family: var(--sans); font-size: 13px; font-weight: 700; padding: 2px 6px; width: 100%; max-width: 130px; outline: none; }

  /* Task / active */
  .lb-task { font-family: var(--mono); font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
  .active-dot { width: 5px; height: 5px; background: var(--green); border-radius: 50%; flex-shrink: 0; animation: pulse 2s infinite; }
  .lb-time { font-family: var(--mono); font-size: 12px; font-weight: 600; text-align: right; }

  /* Daily rank badge */
  .rank-pill { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; white-space: nowrap; text-align: center; }
  .rank-starter  { background:#1a1a00; color:#d4d400; border:1px solid #3a3a00; }
  .rank-bronze   { background:#2a1800; color:#cd7c39; border:1px solid #4a2e00; }
  .rank-silver   { background:#1a1f2a; color:var(--silver); border:1px solid #2e3a4a; }
  .rank-gold     { background:#2d2000; color:var(--gold); border:1px solid #4a3500; }
  .rank-goldplus { background:#332200; color:#ffb830; border:1px solid #5a3d00; }
  .rank-diamond  { background:#001a2d; color:#67e8f9; border:1px solid #0e4f6b; }
  .rank-master   { background:#2d0a00; color:#fb923c; border:1px solid #7c2d12; }
  .rank-legend   { background:#2d1040; color:#c084fc; border:1px solid #6b21a8; }
  .rank-none     { color:var(--muted); font-family:var(--mono); font-size:11px; }

  /* WAR Tab */
  .war-admin-toggle { display: flex; justify-content: flex-end; margin-bottom: 16px; }
  .btn-sm { font-family: var(--mono); font-size: 11px; padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all .2s; }
  .btn-sm:hover { color: var(--text); border-color: #555; }
  .btn-sm.danger { border-color: #6b1f1f; color: var(--red); }
  .btn-sm.danger:hover { background: #3f1515; }
  .btn-sm.primary { border-color: #2d4a2d; color: var(--green); }
  .btn-sm.primary:hover { background: #1a2e1a; }

  /* Admin modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 24px; width: 100%; max-width: 440px; margin: 16px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 12px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .modal-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .modal-field label { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .modal-field input { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 8px 10px; outline: none; transition: border-color .2s; width: 100%; }
  .modal-field input:focus { border-color: #555; }
  .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .modal-sep { height: 1px; background: var(--border); margin: 16px 0; }
  .pwd-gate { display: flex; gap: 8px; align-items: flex-end; }
  .pwd-gate input { flex: 1; }

  /* War layout */
  .war-header { text-align: center; padding: 20px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
  .war-title { font-size: clamp(18px,4vw,24px); font-weight: 800; letter-spacing: -0.3px; }
  .war-meta { display: flex; justify-content: center; gap: 24px; margin-top: 12px; flex-wrap: wrap; }
  .war-meta-item { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .war-meta-item span { color: var(--text); font-weight: 600; }

  .day-labels { display: grid; grid-template-columns: 160px repeat(7,1fr) 80px 70px; gap: 4px; padding: 0 16px 8px; font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: center; }
  .day-labels .name-col { text-align: left; }

  .war-row { display: grid; grid-template-columns: 160px repeat(7,1fr) 80px 70px; gap: 4px; align-items: center; padding: 10px 16px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; background: var(--surface); transition: border-color .2s; }
  .war-row:hover { border-color: #3a3a3a; }

  .day-cell { display: flex; flex-direction: column; align-items: center; gap: 3px; position: relative; }
  .day-bar-wrap { width: 100%; height: 28px; background: #1e1e1e; border-radius: 3px; overflow: hidden; position: relative; border: 1px solid var(--border); }
  .day-bar { position: absolute; bottom: 0; left: 0; right: 0; background: #2e4a2e; transition: height .5s ease; }
  .day-bar.met { background: #166534; }
  .day-bar.exceeded { background: #15803d; }
  .day-hours { font-family: var(--mono); font-size: 9px; color: var(--muted); line-height: 1; }
  .day-hours.met { color: var(--green); }
  .badge-king { position: absolute; top: -1px; right: -1px; font-size: 10px; line-height: 1; }
  .badge-fail { font-size: 9px; font-family: var(--mono); background: #3f1515; color: var(--red); border: 1px solid #6b1f1f; border-radius: 3px; padding: 1px 4px; white-space: nowrap; }
  .day-cell.future .day-bar-wrap { opacity: .3; }

  .war-total { font-family: var(--mono); font-size: 12px; font-weight: 600; text-align: center; }
  .war-rank-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-family: var(--mono); font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .wrank-gold   { background:#2d2000; color:var(--gold); border:1px solid #4a3500; }
  .wrank-silver { background:#1a1f2a; color:var(--silver); border:1px solid #2e3a4a; }
  .wrank-bronze { background:#2a1800; color:#cd7c39; border:1px solid #4a2e00; }

  .legend-strip { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 14px; border: 1px solid #4a3500; border-radius: var(--radius); background: #1a1200; margin-bottom: 20px; }
  .legend-strip .l-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .legend-strip .l-name { font-size: 15px; font-weight: 800; color: var(--gold); }
  .legend-strip .l-hours { font-family: var(--mono); font-size: 12px; color: var(--amber); }

  .war-inactive { text-align: center; padding: 60px 20px; color: var(--muted); font-family: var(--mono); font-size: 13px; }
  .war-inactive .big { font-size: 32px; margin-bottom: 12px; }

  /* Fail admin */
  .fail-admin-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .fail-admin-row .fname { font-size: 12px; font-weight: 700; min-width: 100px; }
  .day-pill { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); cursor: pointer; color: var(--muted); transition: all .2s; }
  .day-pill.has-fail { background: #3f1515; color: var(--red); border-color: #6b1f1f; }
  .day-pill:hover { border-color: #555; color: var(--text); }

  .no-users { text-align: center; padding: 40px; color: var(--muted); font-family: var(--mono); font-size: 13px; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 16px; font-family: var(--mono); font-size: 12px; opacity: 0; transform: translateY(10px); transition: all .3s; z-index: 300; }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1><span class="live-dot"></span>Study Leaderboard</h1>
  <div class="subtitle" id="lastUpdate">Loading...</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('leaderboard')">📊 Leaderboard</button>
  <button class="tab-btn" onclick="switchTab('war')">⚔️ Study War</button>
</div>

<!-- LEADERBOARD TAB -->
<div class="tab-panel active" id="tab-leaderboard">
  <div class="rank-legend">
    <span class="legend-pill">⭐ Starter 1h+</span>
    <span class="legend-pill">🥉 Bronze 3h+</span>
    <span class="legend-pill">🥈 Silver 5h+</span>
    <span class="legend-pill">🥇 Gold 7h+</span>
    <span class="legend-pill">🥇 Gold+ 9h+</span>
    <span class="legend-pill">💎 Diamond 10h+</span>
    <span class="legend-pill">🔥 Master 12h+</span>
    <span class="legend-pill">👑 Legend 15h+</span>
  </div>
  <div class="board-header">
    <span>#</span><span>User</span><span>Current Task</span><span>Total Time</span><span>Rank</span>
  </div>
  <div id="lb-list"><div class="no-users">Loading...</div></div>
</div>

<!-- WAR TAB -->
<div class="tab-panel" id="tab-war">
  <div class="war-admin-toggle">
    <button class="btn-sm" onclick="openAdminModal()">⚙ Admin</button>
  </div>
  <div id="warContent"></div>
</div>

<!-- Admin Modal -->
<div class="modal-overlay" id="adminModal" onclick="closeAdminOnOverlay(event)">
  <div class="modal">
    <h3>Admin Panel</h3>

    <!-- Step 1: password gate -->
    <div id="adminGate">
      <div class="modal-field">
        <label>Admin Password</label>
        <div class="pwd-gate">
          <input type="password" id="adminPwd" placeholder="Enter password" onkeydown="if(event.key==='Enter') verifyAdminPwd()"/>
          <button class="btn-sm primary" onclick="verifyAdminPwd()">Unlock</button>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:8px">
        <button class="btn-sm" onclick="closeAdminModal()">Cancel</button>
      </div>
    </div>

    <!-- Step 2: options after unlock -->
    <div id="adminOptions" style="display:none">
      <div class="modal-field">
        <label>Challenge Start Date</label>
        <input type="date" id="startDateInput"/>
      </div>
      <div class="modal-actions">
        <button class="btn-sm primary" onclick="setWarConfig()">Set Start Date</button>
        <button class="btn-sm" onclick="toggleWarActive()">Toggle Active</button>
        <button class="btn-sm danger" onclick="resetWar()">Reset Challenge</button>
      </div>
      <div class="modal-sep"></div>
      <h3>Fail Badges — click day to toggle</h3>
      <div id="failAdminRows"></div>
      <div style="display:flex;justify-content:flex-end;margin-top:16px">
        <button class="btn-sm" onclick="closeAdminModal()">Close</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const REFRESH_MS = 15000;
let warData = null;
let adminUnlocked = false;

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['leaderboard','war'][i] === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

function showToast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = ok ? '#2d4a2d' : '#6b1f1f';
  t.style.color = ok ? 'var(--green)' : 'var(--red)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function msToHHMM(ms) {
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return `${h}h ${m.toString().padStart(2,'0')}m`;
}

function getDailyRank(ms) {
  const h = ms / 3600000;
  if (h >= 15) return { label: '👑 Legend', cls: 'rank-legend' };
  if (h >= 12) return { label: '🔥 Master', cls: 'rank-master' };
  if (h >= 10) return { label: '💎 Diamond', cls: 'rank-diamond' };
  if (h >= 9)  return { label: '🥇 Gold+',  cls: 'rank-goldplus' };
  if (h >= 7)  return { label: '🥇 Gold',   cls: 'rank-gold' };
  if (h >= 5)  return { label: '🥈 Silver', cls: 'rank-silver' };
  if (h >= 3)  return { label: '🥉 Bronze', cls: 'rank-bronze' };
  if (h >= 1)  return { label: '⭐ Starter', cls: 'rank-starter' };
  return null;
}

// ── Admin modal ───────────────────────────────────────────────────────────────
function openAdminModal() {
  adminUnlocked = false;
  document.getElementById('adminGate').style.display = 'block';
  document.getElementById('adminOptions').style.display = 'none';
  document.getElementById('adminPwd').value = '';
  document.getElementById('adminModal').classList.add('show');
  setTimeout(() => document.getElementById('adminPwd').focus(), 50);
}

function closeAdminModal() {
  document.getElementById('adminModal').classList.remove('show');
}

function closeAdminOnOverlay(e) {
  if (e.target === document.getElementById('adminModal')) closeAdminModal();
}

async function verifyAdminPwd() {
  const pwd = document.getElementById('adminPwd').value;
  if (!pwd) { showToast('Enter password', false); return; }
  try {
    const res = await fetch('/api/war/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword: pwd })
    });
    if (res.status === 403) { showToast('Wrong password', false); return; }
    const d = await res.json();
    if (d.error) { showToast('Wrong password', false); return; }
    adminUnlocked = true;
    document.getElementById('adminGate').style.display = 'none';
    document.getElementById('adminOptions').style.display = 'block';
    renderFailAdmin(warData);
  } catch(e) { showToast('Request failed', false); }
}

// ── Username rename ───────────────────────────────────────────────────────────
function makeUsernameCell(username, wrapClass, textClass) {
  const wrap = document.createElement('div');
  wrap.className = wrapClass;

  const span = document.createElement('span');
  span.className = textClass;
  span.textContent = username;

  const pencil = document.createElement('button');
  pencil.className = 'uname-edit-btn';
  pencil.title = 'Rename';
  pencil.textContent = '✎';
  pencil.addEventListener('click', () => startRename(wrap, username, wrapClass, textClass));

  wrap.appendChild(span);
  wrap.appendChild(pencil);
  return wrap;
}

function startRename(wrap, oldName, wrapClass, textClass) {
  const input = document.createElement('input');
  input.className = 'uname-input';
  input.value = oldName;
  wrap.innerHTML = '';
  wrap.appendChild(input);
  input.focus();
  input.select();

  let committed = false;
  async function commit() {
    if (committed) return;
    committed = true;
    const newName = input.value.trim();
    if (!newName || newName === oldName) {
      restoreCell(wrap, oldName, wrapClass, textClass);
      return;
    }
    try {
      const res = await fetch('/api/rename', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ oldName, newName })
      });
      const d = await res.json();
      if (d.ok) { showToast(`Renamed to ${d.newName}`); fetchLeaderboard(); fetchWar(); }
      else { showToast(d.error || 'Error', false); restoreCell(wrap, oldName, wrapClass, textClass); }
    } catch(e) { showToast('Request failed', false); restoreCell(wrap, oldName, wrapClass, textClass); }
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { committed = true; restoreCell(wrap, oldName, wrapClass, textClass); }
  });
  input.addEventListener('blur', commit);
}

function restoreCell(wrap, name, wrapClass, textClass) {
  wrap.innerHTML = '';
  const restored = makeUsernameCell(name, wrapClass, textClass);
  restored.childNodes.forEach(n => wrap.appendChild(n));
}

// ── Leaderboard ───────────────────────────────────────────────────────────────
async function fetchLeaderboard() {
  try {
    const res = await fetch('/api/leaderboard');
    const users = await res.json();
    renderLeaderboard(users);
    document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) { console.error(e); }
}

function renderLeaderboard(users) {
  const list = document.getElementById('lb-list');
  if (!users.length) { list.innerHTML = '<div class="no-users">No data yet.</div>'; return; }
  list.innerHTML = '';
  const posClass = ['first','second','third'];

  users.forEach((u, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row';

    const pos = document.createElement('div');
    pos.className = 'lb-pos ' + (posClass[i] || '');
    pos.textContent = i + 1;

    const unameCell = makeUsernameCell(u.username, 'uname-wrap', 'uname-text');

    const taskDiv = document.createElement('div');
    taskDiv.className = 'lb-task';
    if (u.isActive) { const d = document.createElement('span'); d.className = 'active-dot'; taskDiv.appendChild(d); }
    const tl = document.createElement('span');
    tl.textContent = u.currentTask || (u.isActive ? 'Studying...' : '—');
    taskDiv.appendChild(tl);

    const timeDiv = document.createElement('div');
    timeDiv.className = 'lb-time';
    timeDiv.textContent = msToHHMM(u.timeSpentMs);

    const rankDiv = document.createElement('div');
    const rank = getDailyRank(u.timeSpentMs);
    rankDiv.innerHTML = rank
      ? `<span class="rank-pill ${rank.cls}">${rank.label}</span>`
      : `<span class="rank-none">—</span>`;

    row.appendChild(pos);
    row.appendChild(unameCell);
    row.appendChild(taskDiv);
    row.appendChild(timeDiv);
    row.appendChild(rankDiv);
    list.appendChild(row);
  });
}

// ── War ───────────────────────────────────────────────────────────────────────
async function fetchWar() {
  try {
    const res = await fetch('/api/war/status');
    warData = await res.json();
    renderWar(warData);
    if (adminUnlocked) renderFailAdmin(warData);
  } catch(e) { console.error(e); }
}

function renderWar(data) {
  const container = document.getElementById('warContent');
  if (!data.startDate) {
    container.innerHTML = `<div class="war-inactive"><div class="big">⚔️</div>No active challenge.<br>Admin can set a start date to begin.</div>`;
    return;
  }

  const now = new Date();
  const endD = new Date(data.startDate); endD.setDate(endD.getDate() + 7);
  const daysLeft = Math.max(0, Math.ceil((endD - now) / 86400000));

  let legendHtml = '';
  if (data.legend) {
    const lu = data.users.find(u => u.username === data.legend);
    legendHtml = `<div class="legend-strip">
      <span style="font-size:18px">👑</span>
      <div><div class="l-label">Current Legend</div><div class="l-name">${data.legend}</div></div>
      <div class="l-hours">${lu ? lu.totalHours.toFixed(1) : '0'}h total</div>
    </div>`;
  }

  const users = [...data.users].sort((a,b) => b.totalHours - a.totalHours);

  container.innerHTML = `
    <div class="war-header">
      <div class="war-title">⚔️ 7-DAY STUDY WAR</div>
      <div class="war-meta">
        <div class="war-meta-item">Start: <span>${data.startDate}</span></div>
        <div class="war-meta-item">Day: <span>${Math.min(data.currentDay+1,7)}/7</span></div>
        <div class="war-meta-item">Days Left: <span>${daysLeft}</span></div>
        <div class="war-meta-item">Status: <span style="color:${data.active?'var(--green)':'var(--muted)'}">${data.active?'ACTIVE':'INACTIVE'}</span></div>
      </div>
    </div>
    ${legendHtml}
    <div class="day-labels">
      <div class="name-col">Warrior</div>
      ${Array.from({length:7},(_,i)=>`<div>D${i+1}</div>`).join('')}
      <div>Total</div><div>Rank</div>
    </div>
    <div id="warRows"></div>`;

  const warRows = document.getElementById('warRows');
  if (!users.length) { warRows.innerHTML = '<div class="no-users">No warriors yet.</div>'; return; }

  users.forEach(u => {
    const row = document.createElement('div');
    row.className = 'war-row';

    const unameCell = makeUsernameCell(u.username, 'war-uname-wrap', 'war-uname-text');
    row.appendChild(unameCell);

    u.days.forEach((day, i) => {
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (day.isFuture ? ' future' : '');
      const pct = Math.min(100, (day.hours / 14) * 100);
      const barClass = day.met14h ? 'exceeded' : day.met10h ? 'met' : '';
      const isKing = data.kingsPerDay[i] === u.username && day.hours > 0;
      cell.innerHTML = `
        <div class="day-bar-wrap">
          <div class="day-bar ${barClass}" style="height:${day.isFuture?0:pct}%"></div>
          ${isKing ? `<span class="badge-king">👑</span>` : ''}
        </div>
        <div class="day-hours ${day.met10h && !day.isFuture ? 'met' : ''}">${day.isFuture ? '' : day.hours.toFixed(1)}</div>
        ${day.hasRedBadge ? `<span class="badge-fail">✗ fail</span>` : ''}`;
      row.appendChild(cell);
    });

    const total = document.createElement('div');
    total.className = 'war-total';
    total.textContent = u.totalHours.toFixed(1) + 'h';
    row.appendChild(total);

    const rankDiv = document.createElement('div');
    rankDiv.innerHTML = u.rank === 'gold'   ? `<span class="war-rank-badge wrank-gold">🥇 Gold</span>`
      : u.rank === 'silver' ? `<span class="war-rank-badge wrank-silver">🥈 Silver</span>`
      : u.rank === 'bronze' ? `<span class="war-rank-badge wrank-bronze">🥉 Bronze</span>`
      : `<span style="color:var(--muted);font-family:var(--mono);font-size:11px">—</span>`;
    row.appendChild(rankDiv);

    warRows.appendChild(row);
  });
}

function renderFailAdmin(data) {
  const container = document.getElementById('failAdminRows');
  if (!container || !data?.users) return;
  container.innerHTML = data.users.map(u =>
    `<div class="fail-admin-row">
      <span class="fname">${u.username}</span>
      ${u.days.map((day, i) =>
        `<span class="day-pill ${day.hasRedBadge?'has-fail':''}" onclick="toggleFailBadge('${u.username}',${i})">${day.hasRedBadge?'✗ ':''}D${i+1}</span>`
      ).join('')}
    </div>`
  ).join('') || '<div style="color:var(--muted);font-family:var(--mono);font-size:12px">No users yet.</div>';
}

async function toggleFailBadge(username, dayIndex) {
  const pwd = document.getElementById('adminPwd').value;
  const user = warData?.users?.find(u => u.username === username);
  const action = user?.days[dayIndex]?.hasRedBadge ? 'remove' : 'add';
  try {
    const res = await fetch('/api/war/fail-badge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': pwd },
      body: JSON.stringify({ username, dayIndex, action })
    });
    const d = await res.json();
    if (d.ok) { showToast(`Badge ${action}d for ${username} D${dayIndex+1}`); fetchWar(); }
    else showToast(d.error || 'Error', false);
  } catch(e) { showToast('Request failed', false); }
}

async function setWarConfig() {
  const pwd = document.getElementById('adminPwd').value;
  const startDate = document.getElementById('startDateInput').value;
  if (!startDate) { showToast('Select a start date', false); return; }
  try {
    const res = await fetch('/api/war/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword: pwd, startDate, active: true })
    });
    const d = await res.json();
    if (d.ok) { showToast('Challenge configured!'); fetchWar(); closeAdminModal(); }
    else showToast(d.error || 'Error', false);
  } catch(e) { showToast('Request failed', false); }
}

async function toggleWarActive() {
  const pwd = document.getElementById('adminPwd').value;
  try {
    const res = await fetch('/api/war/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword: pwd, active: !warData?.active })
    });
    const d = await res.json();
    if (d.ok) { showToast(`Challenge ${!warData?.active?'activated':'deactivated'}`); fetchWar(); }
    else showToast(d.error || 'Error', false);
  } catch(e) { showToast('Request failed', false); }
}

async function resetWar() {
  const pwd = document.getElementById('adminPwd').value;
  if (!confirm('Reset entire challenge? This clears all badges and start date.')) return;
  try {
    const res = await fetch('/api/war/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword: pwd })
    });
    const d = await res.json();
    if (d.ok) { showToast('Challenge reset'); fetchWar(); closeAdminModal(); }
    else showToast(d.error || 'Error', false);
  } catch(e) { showToast('Request failed', false); }
}

fetchLeaderboard();
fetchWar();
setInterval(() => { fetchLeaderboard(); fetchWar(); }, REFRESH_MS);
</script>
</body>
</html>
