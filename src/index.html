<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #666;
    --accent: #e8e8e8;
    --green: #4ade80;
    --red: #f87171;
    --amber: #fbbf24;
    --blue: #60a5fa;
    --gold: #f59e0b;
    --silver: #94a3b8;
    --bronze: #b45309;
    --king: #f59e0b;
    --radius: 4px;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: clamp(20px, 4vw, 28px);
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .header .subtitle {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
    gap: 0;
  }
  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color .2s, border-color .2s;
    letter-spacing: .3px;
  }
  .tab-btn.active {
    color: var(--text);
    border-bottom-color: var(--text);
  }
  .tab-btn:hover { color: var(--text); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Leaderboard Tab ── */
  .lb-row {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    background: var(--surface);
    gap: 14px;
    transition: border-color .2s;
  }
  .lb-row:hover { border-color: #444; }
  .lb-rank {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    width: 22px;
    flex-shrink: 0;
  }
  .lb-rank.first { color: var(--gold); font-weight: 600; }
  .lb-rank.second { color: var(--silver); }
  .lb-rank.third { color: var(--bronze); }
  .lb-name {
    flex: 1;
    font-size: 14px;
    font-weight: 700;
  }
  .lb-active-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }
  .lb-time {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
  }
  .lb-bar-wrap {
    width: 80px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .lb-bar { height: 100%; background: var(--green); border-radius: 2px; transition: width .6s; }

  /* ── WAR Tab ── */
  .war-header {
    text-align: center;
    padding: 20px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .war-title {
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 800;
    letter-spacing: -0.3px;
  }
  .war-meta {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .war-meta-item {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .war-meta-item span { color: var(--text); font-weight: 600; }

  .day-labels {
    display: grid;
    grid-template-columns: 160px repeat(7, 1fr) 80px 70px;
    gap: 4px;
    padding: 0 16px 8px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-align: center;
  }
  .day-labels .name-col { text-align: left; }

  .war-row {
    display: grid;
    grid-template-columns: 160px repeat(7, 1fr) 80px 70px;
    gap: 4px;
    align-items: center;
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    background: var(--surface);
    transition: border-color .2s;
  }
  .war-row:hover { border-color: #3a3a3a; }

  .war-username {
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
    overflow: hidden;
  }
  .war-username .uname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .day-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    position: relative;
  }
  .day-bar-wrap {
    width: 100%;
    height: 28px;
    background: #1e1e1e;
    border-radius: 3px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--border);
  }
  .day-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #2e4a2e;
    transition: height .5s ease;
  }
  .day-bar.met { background: #166534; }
  .day-bar.exceeded { background: #15803d; }
  .day-hours {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    line-height: 1;
  }
  .day-hours.met { color: var(--green); }

  /* badges */
  .badge-king {
    position: absolute;
    top: -1px;
    right: -1px;
    font-size: 10px;
    line-height: 1;
  }
  .badge-fail {
    font-size: 9px;
    font-family: var(--mono);
    background: #3f1515;
    color: var(--red);
    border: 1px solid #6b1f1f;
    border-radius: 3px;
    padding: 1px 4px;
    white-space: nowrap;
  }
  .badge-redeemed {
    font-size: 9px;
    font-family: var(--mono);
    background: #1a2e1a;
    color: var(--green);
    border: 1px solid #2d4a2d;
    border-radius: 3px;
    padding: 1px 4px;
  }
  .day-cell.future .day-bar-wrap { opacity: .3; }

  .war-total {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    text-align: center;
  }
  .rank-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .rank-gold { background: #2d2000; color: var(--gold); border: 1px solid #4a3500; }
  .rank-silver { background: #1a1f2a; color: var(--silver); border: 1px solid #2e3a4a; }
  .rank-bronze { background: #2a1800; color: #cd7c39; border: 1px solid #4a2e00; }
  .rank-legend { background: #2d1040; color: #c084fc; border: 1px solid #6b21a8; }

  /* War not active */
  .war-inactive {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }
  .war-inactive .big { font-size: 32px; margin-bottom: 12px; }

  /* ── Admin Panel ── */
  .admin-toggle {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 16px;
  }
  .btn-sm {
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
  }
  .btn-sm:hover { color: var(--text); border-color: #555; }
  .btn-sm.danger { border-color: #6b1f1f; color: var(--red); }
  .btn-sm.danger:hover { background: #3f1515; }
  .btn-sm.primary { border-color: #2d4a2d; color: var(--green); }
  .btn-sm.primary:hover { background: #1a2e1a; }

  .admin-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }
  .admin-panel h3 {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .admin-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: flex-end;
  }
  .admin-field { display: flex; flex-direction: column; gap: 5px; }
  .admin-field label { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .admin-field input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color .2s;
  }
  .admin-field input:focus { border-color: #555; }
  .admin-separator { width: 100%; height: 1px; background: var(--border); margin: 12px 0; }

  /* Fail badge admin row */
  .fail-admin-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .fail-admin-row .uname { font-size: 12px; font-weight: 700; min-width: 100px; }
  .day-pill {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    color: var(--muted);
    transition: all .2s;
  }
  .day-pill.has-fail { background: #3f1515; color: var(--red); border-color: #6b1f1f; }
  .day-pill:hover { border-color: #555; color: var(--text); }

  /* Legend section */
  .legend-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 14px;
    border: 1px solid #4a3500;
    border-radius: var(--radius);
    background: #1a1200;
    margin-bottom: 20px;
  }
  .legend-strip .l-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .legend-strip .l-name { font-size: 15px; font-weight: 800; color: var(--gold); }
  .legend-strip .l-hours { font-family: var(--mono); font-size: 12px; color: var(--amber); }

  /* Mobile */
  @media (max-width: 700px) {
    .day-labels { display: none; }
    .war-row {
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .war-days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .war-total, .rank-badge { justify-self: start; }
  }

  .no-users { text-align: center; padding: 40px; color: var(--muted); font-family: var(--mono); font-size: 13px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 12px;
    opacity: 0;
    transform: translateY(10px);
    transition: all .3s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="header">
  <h1><span class="live-dot"></span>Study Leaderboard</h1>
  <div class="subtitle" id="lastUpdate">Loading...</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('leaderboard')">📊 Leaderboard</button>
  <button class="tab-btn" onclick="switchTab('war')">⚔️ Study War</button>
</div>

<!-- LEADERBOARD TAB -->
<div class="tab-panel active" id="tab-leaderboard">
  <div id="lb-list"><div class="no-users">Loading...</div></div>
</div>

<!-- WAR TAB -->
<div class="tab-panel" id="tab-war">

  <div class="admin-toggle">
    <button class="btn-sm" onclick="toggleAdmin()">⚙ Admin</button>
  </div>

  <!-- Admin Panel -->
  <div class="admin-panel" id="adminPanel" style="display:none">
    <h3>Admin Panel</h3>
    <div class="admin-grid">
      <div class="admin-field">
        <label>Admin Password</label>
        <input type="password" id="adminPwd" placeholder="password"/>
      </div>
      <div class="admin-field">
        <label>Challenge Start Date</label>
        <input type="date" id="startDateInput"/>
      </div>
      <button class="btn-sm primary" onclick="setWarConfig()">Set Start Date</button>
      <button class="btn-sm" onclick="toggleWarActive()">Toggle Active</button>
      <button class="btn-sm danger" onclick="resetWar()">Reset Challenge</button>
    </div>

    <div class="admin-separator"></div>
    <h3>Fail Badges — Click day to toggle red badge</h3>
    <div id="failAdminRows"></div>
  </div>

  <!-- War Content -->
  <div id="warContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const REFRESH_MS = 15000;
let warData = null;
let adminVisible = false;

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['leaderboard','war'][i] === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

function toggleAdmin() {
  adminVisible = !adminVisible;
  document.getElementById('adminPanel').style.display = adminVisible ? 'block' : 'none';
}

function showToast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = ok ? '#2d4a2d' : '#6b1f1f';
  t.style.color = ok ? 'var(--green)' : 'var(--red)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function msToHHMM(ms) {
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return `${h}h ${m.toString().padStart(2,'0')}m`;
}

// ── Leaderboard ───────────────────────────────────────────────────────────────
async function fetchLeaderboard() {
  try {
    const res = await fetch('/api/leaderboard');
    const users = await res.json();
    renderLeaderboard(users);
    document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) { console.error(e); }
}

function renderLeaderboard(users) {
  const maxMs = users[0]?.timeSpentMs || 1;
  const rankClass = ['first','second','third'];
  const html = users.length === 0
    ? '<div class="no-users">No data yet.</div>'
    : users.map((u, i) => `
      <div class="lb-row">
        <div class="lb-rank ${rankClass[i]||''}">${i+1}</div>
        <div class="lb-name">${u.username}</div>
        ${u.isActive ? '<div class="lb-active-dot"></div>' : '<div style="width:6px"></div>'}
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${Math.round(u.timeSpentMs/maxMs*100)}%"></div></div>
        <div class="lb-time">${msToHHMM(u.timeSpentMs)}</div>
      </div>`).join('');
  document.getElementById('lb-list').innerHTML = html;
}

// ── War ───────────────────────────────────────────────────────────────────────
async function fetchWar() {
  try {
    const res = await fetch('/api/war/status');
    warData = await res.json();
    renderWar(warData);
    renderFailAdmin(warData);
  } catch(e) { console.error(e); }
}

function renderWar(data) {
  const container = document.getElementById('warContent');

  if (!data.startDate) {
    container.innerHTML = `<div class="war-inactive"><div class="big">⚔️</div>No active challenge.<br>Admin can set a start date to begin.</div>`;
    return;
  }

  const dayLabels = Array.from({length:7}, (_,i) => `D${i+1}`);
  const now = new Date();
  const startD = new Date(data.startDate);
  const endD = new Date(startD); endD.setDate(endD.getDate()+7);
  const daysLeft = Math.max(0, Math.ceil((endD - now) / 86400000));

  // Legend strip
  let legendHtml = '';
  if (data.legend) {
    const lu = data.users.find(u => u.username === data.legend);
    legendHtml = `
      <div class="legend-strip">
        <span style="font-size:18px">👑</span>
        <div>
          <div class="l-label">Current Legend</div>
          <div class="l-name">${data.legend}</div>
        </div>
        <div class="l-hours">${lu ? lu.totalHours.toFixed(1) : '0'}h total</div>
      </div>`;
  }

  // Sort users by total hours desc
  const users = [...data.users].sort((a,b) => b.totalHours - a.totalHours);

  const dayLabelsRow = `
    <div class="day-labels">
      <div class="name-col">Warrior</div>
      ${dayLabels.map(d=>`<div>${d}</div>`).join('')}
      <div>Total</div>
      <div>Rank</div>
    </div>`;

  const rows = users.map(u => {
    const dayCells = u.days.map((day, i) => {
      const pct = Math.min(100, (day.hours / 14) * 100);
      const barClass = day.met14h ? 'exceeded' : day.met10h ? 'met' : '';
      const isKing = data.kingsPerDay[i] === u.username && day.hours > 0;
      const future = day.isFuture ? 'future' : '';
      const badge = day.hasRedBadge
        ? `<span class="badge-fail">✗ fail</span>`
        : '';
      return `
        <div class="day-cell ${future}">
          <div class="day-bar-wrap">
            <div class="day-bar ${barClass}" style="height:${future ? 0 : pct}%"></div>
            ${isKing ? `<span class="badge-king">👑</span>` : ''}
          </div>
          <div class="day-hours ${day.met10h && !future ? 'met' : ''}">${future ? '' : day.hours.toFixed(1)}</div>
          ${badge}
        </div>`;
    }).join('');

    const rankHtml = u.rank === 'gold' ? `<span class="rank-badge rank-gold">🥇 Gold</span>`
      : u.rank === 'silver' ? `<span class="rank-badge rank-silver">🥈 Silver</span>`
      : u.rank === 'bronze' ? `<span class="rank-badge rank-bronze">🥉 Bronze</span>`
      : `<span class="rank-badge" style="color:var(--muted);border-color:var(--border)">—</span>`;

    const isLegend = data.legend === u.username;
    const legendMark = isLegend ? ' 👑' : '';

    return `
      <div class="war-row">
        <div class="war-username">
          <span class="uname">${u.username}${legendMark}</span>
        </div>
        ${dayCells}
        <div class="war-total">${u.totalHours.toFixed(1)}h</div>
        <div>${rankHtml}</div>
      </div>`;
  }).join('');

  container.innerHTML = `
    <div class="war-header">
      <div class="war-title">⚔️ 7-DAY STUDY WAR</div>
      <div class="war-meta">
        <div class="war-meta-item">Start: <span>${data.startDate}</span></div>
        <div class="war-meta-item">Day: <span>${Math.min(data.currentDay+1,7)}/7</span></div>
        <div class="war-meta-item">Days Left: <span>${daysLeft}</span></div>
        <div class="war-meta-item">Status: <span style="color:${data.active?'var(--green)':'var(--muted)'}">${data.active?'ACTIVE':'INACTIVE'}</span></div>
      </div>
    </div>
    ${legendHtml}
    ${dayLabelsRow}
    ${rows.length ? rows : '<div class="no-users">No warriors yet.</div>'}
  `;
}

function renderFailAdmin(data) {
  if (!data || !data.users) return;
  const container = document.getElementById('failAdminRows');
  if (!container) return;

  const rows = data.users.map(u => {
    const pills = u.days.map((day, i) => {
      const hasFail = day.hasRedBadge;
      return `<span class="day-pill ${hasFail?'has-fail':''}" onclick="toggleFailBadge('${u.username}',${i})">${hasFail?'✗':''} D${i+1}</span>`;
    }).join('');
    return `<div class="fail-admin-row"><span class="uname">${u.username}</span>${pills}</div>`;
  }).join('');

  container.innerHTML = rows || '<div style="color:var(--muted);font-family:var(--mono);font-size:12px">No users yet.</div>';
}

async function toggleFailBadge(username, dayIndex) {
  const pwd = document.getElementById('adminPwd')?.value;
  if (!pwd) { showToast('Enter admin password first', false); return; }

  const user = warData?.users?.find(u => u.username === username);
  const hasFail = user?.days[dayIndex]?.hasRedBadge;
  const action = hasFail ? 'remove' : 'add';

  try {
    const res = await fetch('/api/war/fail-badge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': pwd },
      body: JSON.stringify({ username, dayIndex, action })
    });
    const d = await res.json();
    if (d.ok) { showToast(`Badge ${action}d for ${username} D${dayIndex+1}`); fetchWar(); }
    else showToast(d.error || 'Error', false);
  } catch(e) { showToast('Request failed', false); }
}

async function setWarConfig() {
  const pwd = document.getElementById('adminPwd')?.value;
  const startDate = document.getElementById('startDateInput')?.value;
  if (!pwd) { showToast('Enter admin password', false); return; }
  if (!startDate) { showToast('Select a start date', false); return; }
  try {
    const res = await fetch('/api/war/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword: pwd, startDate, active: true })
    });
    const d = await res.json();
    if (d.ok) { showToast('Challenge configured!'); fetchWar(); }
    else showToast(d.error || 'Error', false);
  } catch(e) { showToast('Request failed', false); }
}

async function toggleWarActive() {
  const pwd = document.getElementById('adminPwd')?.value;
  if (!pwd) { showToast('Enter admin password', false); return; }
  const current = warData?.active;
  try {
    const res = await fetch('/api/war/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword: pwd, active: !current })
    });
    const d = await res.json();
    if (d.ok) { showToast(`Challenge ${!current?'activated':'deactivated'}`); fetchWar(); }
    else showToast(d.error || 'Error', false);
  } catch(e) { showToast('Request failed', false); }
}

async function resetWar() {
  const pwd = document.getElementById('adminPwd')?.value;
  if (!pwd) { showToast('Enter admin password', false); return; }
  if (!confirm('Reset entire challenge? This clears all badges and start date.')) return;
  try {
    const res = await fetch('/api/war/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword: pwd })
    });
    const d = await res.json();
    if (d.ok) { showToast('Challenge reset'); fetchWar(); }
    else showToast(d.error || 'Error', false);
  } catch(e) { showToast('Request failed', false); }
}

// ── Init ──────────────────────────────────────────────────────────────────────
fetchLeaderboard();
fetchWar();
setInterval(() => { fetchLeaderboard(); fetchWar(); }, REFRESH_MS);
</script>
